<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <style>
        .xterm-helper-textarea {
            opacity: 1 !important;
            background: red !important;
            color: white !important;
            z-index: 1000 !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100px !important;
            height: 30px !important;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script>
        const term = new Terminal();
        term.open(document.getElementById('terminal'));
        term.onData(e => {
            console.log("Data:", e);
            term.write(e);
        });
        
        term.attachCustomKeyEventHandler(e => {
            if (e.type === 'keydown' && !e.ctrlKey && !e.metaKey && !e.altKey && e.key.length === 1) {
                return false; // let it go to textarea
            }
            if (e.type === 'keydown' && e.key === 'Backspace') {
                return false;
            }
            return true;
        });

        // clear on space
        const textarea = document.querySelector('.xterm-helper-textarea');
        textarea.addEventListener('input', e => {
            console.log("Input event:", e.data, textarea.value);
            if (textarea.value.endsWith(' ')) {
                setTimeout(() => textarea.value = '', 10);
            }
        });
    </script>
</body>
</html>
