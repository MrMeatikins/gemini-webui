version: '3.8'

services:
  gemini-web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - LDAP_SERVER=ldap://192.168.1.101
      - LDAP_DOMAIN=adamoutler.com
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ~/Gemini:/app/Gemini
      - ~/.gemini:/home/node/.gemini
      - ~/.ssh:/home/node/.ssh:ro
    restart: unless-stopped